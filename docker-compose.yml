version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: folio_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: manilamu
      POSTGRES_DB: portfolio_db
    ports:
      - "8000:5432" # Mapped to 8000 as configured in application.properties
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: folio_backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/portfolio_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=manilamu
      - APP_JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - APP_FRONTEND_URL=http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./portfolio-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080
    container_name: folio_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads_data:
