# System Server Port Configuration
server.port=${PORT:8080}

# Database Configuration - PostgreSQL (Port 8000)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:8000/portfolio_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:manilamu}
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicit Dialect Override (Prevents the metadata detection crash)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Connection Pooling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Database Initialization
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Multipart Upload Configurations (Max size 10MB for PDF resumes)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Custom Application Properties
app.jwt.secret=${APP_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.backend.url=${APP_BACKEND_URL:https://folio-backend-k6qf.onrender.com}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# OAuth2 Google Login (uses env vars in production)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# CORS allowed origins (set via env var in production)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://folio-frontend.onrender.com}