# System Server Port Configuration
server.port=8080

# Database Configuration - PostgreSQL (Port 8000)
spring.datasource.url=jdbc:postgresql://localhost:8000/portfolio_db
spring.datasource.username=postgres
spring.datasource.password=manilamu
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicit Dialect Override (Prevents the metadata detection crash)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Connection Pooling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Database Initialization
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Multipart Upload Configurations (Max size 10MB for PDF resumes)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Custom Application Properties
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.upload.dir=uploads

# OAuth2 Google Login (disabled for local development)
spring.security.oauth2.client.registration.google.client-id=dummy-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}